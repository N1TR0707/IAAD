# Konfigurasi Nginx untuk IAAD Project
# Salin ke: /etc/nginx/sites-available/iaad
# Aktifkan: sudo ln -s /etc/nginx/sites-available/iaad /etc/nginx/sites-enabled/
# Ganti "iaadproject.com" dengan domain Anda.

server {
    listen 80;
    server_name iaadproject.com www.iaadproject.com;

    # Batas ukuran upload (samakan dengan MAX_FILE_SIZE backend = 5MB + sedikit margin)
    client_max_body_size 6M;

    # --- Frontend (file statis hasil build Vite) ---
    root /var/www/iaad/frontend/dist;
    index index.html;

    # SPA: semua route diarahkan ke index.html (kecuali file nyata)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API backend (proxy ke Node/PM2 di port 5000) ---
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Gambar upload (proxy ke backend) ---
    location /uploads/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }

    # Cache aset statis frontend
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
